name: Publicar Rota PCPR

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar arquivos do site
        uses: actions/checkout@v6
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
      - name: Preparar arquivos para publicação
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
